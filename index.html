<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aïcha Maintenance</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#1e3a8a">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary-blue: #1e3a8a; --secondary-blue: #3b82f6; --white: #ffffff; --light-bg: #f1f5f9; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); height: 100vh; overflow: hidden; }

        /* CONNEXION */
        #login-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue)); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.6s; }
        .login-container { background: var(--white); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

        /* DASHBOARD */
        #main-dashboard { display: none; height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: var(--primary-blue); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 20px; height: 100vh; overflow-y: auto; }

        /* HERO IMAGE LOCALE */
        .hero-sima {
            height: 300px; border-radius: 20px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(30,58,138,0.5)), url('hero.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 30px; color: white; margin-bottom: 20px;
        }

        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* NAVIGATION SOUS-PAGES */
        .sub-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-nav button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; }
        .sub-nav button.active { background: var(--primary-blue); color: white; }
        .sub-content { display: none; }
        .sub-content.active { display: block; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 70px; }
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-container">
            <img src="logo.png" alt="Logo" style="max-width:120px; margin-bottom:20px;">
            <input type="password" id="pass" placeholder="Code d'accès" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary-blue); color:white; border:none; border-radius:8px; font-weight:bold;">Entrer</button>
        </div>
    </div>

    <div id="main-dashboard">
        <aside class="sidebar">
            <div style="background:white; padding:5px; border-radius:8px; margin-bottom:20px;"><img src="logo.png" style="width:100%;"></div>
            <nav>
                <div onclick="showPage('accueil')" style="cursor:pointer; margin-bottom:15px;"><i class="fas fa-home"></i> <span>Accueil</span></div>
                <div onclick="showPage('bt')" style="cursor:pointer; margin-bottom:15px;"><i class="fas fa-file-alt"></i> <span>Bon de Travaux</span></div>
                <div onclick="showPage('plan')" style="cursor:pointer; margin-bottom:15px;"><i class="fas fa-calendar"></i> <span>Plan de Maintenance</span></div>
            </nav>
        </aside>

        <main class="main-content">
            <section id="accueil" class="page active">
                <div class="hero-sima"><h2>Maintenance Aïcha</h2></div>
                <div class="card"><h3>Système Prêt</h3></div>
            </section>

            <section id="bt" class="page">
                <div class="card" id="pdf-content">
                    <h2>Nouveau Bon de Travaux</h2>
                    <input type="text" placeholder="Équipement" style="width:100%; margin-top:10px; padding:10px;">
                    <textarea placeholder="Description" style="width:100%; margin-top:10px; padding:10px;"></textarea>
                    <button onclick="genererPDF()" style="margin-top:15px; padding:10px; background:#dc2626; color:white; border:none; border-radius:5px;">Télécharger PDF</button>
                </div>
            </section>

            <section id="plan" class="page">
                <div class="sub-nav">
                    <button id="btn-calendrier" class="active" onclick="showSub('calendrier')">Calendrier</button>
                    <button id="btn-equip" onclick="showSub('equip')">Équipements</button>
                    <button id="btn-support" onclick="showSub('support')">Support</button>
                </div>
                <div id="sub-calendrier" class="sub-content active"><div class="card">Planning de la semaine...</div></div>
                <div id="sub-equip" class="sub-content"><div class="card">Liste des machines...</div></div>
                <div id="sub-support" class="sub-content"><div class="card">Contacts techniques...</div></div>
            </section>
        </main>
    </div>

    <script>
        function login() {
            document.getElementById('login-page').style.transform = 'translateY(-100%)';
            setTimeout(() => { document.getElementById('main-dashboard').style.display = 'flex'; }, 600);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showSub(id) {
            document.querySelectorAll('.sub-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('sub-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        async function genererPDF() {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.getElementById("pdf-content"));
            const pdf = new jsPDF();
            pdf.addImage(canvas.toDataURL("image/png"), 'PNG', 10, 10, 190, 0);
            pdf.save("BT_Aicha.pdf");
        }

        // Activation du mode application
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
